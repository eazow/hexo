<!-- https://github.com/DenverCoder1/readme-typing-svg/ -->
<svg xmlns='http://www.w3.org/2000/svg'
    xmlns:xlink='http://www.w3.org/1999/xlink'
    viewBox='0 0 420 90'
    style='background-color: #00000000;'
    width='420px' height='90px'>

    <style>
@font-face {
  font-family: 'Fira Code';
  font-style: normal;
  font-weight: 700;
  font-display: fallback;
  src: url(data:font/truetype;base64,) format('truetype');
}
</style>

                <path id='path0'>
                            <!-- Single line -->
                                <animate id='d0' attributeName='d' begin='0s'
                    dur='2500ms' fill='freeze'
                    values='m0,45 h0 ; m0,45 h420 ; m0,45 h420 ; m0,45 h420' keyTimes='0;0.8;0.8;1' />
                    </path>
    <text font-family='"Fira Code", monospace' fill='#A78BFA' font-size='48'
        dominant-baseline='middle'
        x='50%' text-anchor='middle'
        letter-spacing='10px'>
        <textPath xlink:href='#path0'>
            EAZOW
        </textPath>
    </text>
</svg>
